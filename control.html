<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Linger - Music Control</title>
    <link rel="stylesheet" href="fonts/fonts.css" />
    <link rel="stylesheet" href="control.css?v=artist-name-fallback-1" />
  </head>
  <body>
    <main class="control-page" aria-label="Year music control demo">
      <div class="year-tabs" aria-label="Choose music year">
        <button type="button" data-year="2022">2022</button>
        <button type="button" data-year="2023">2023</button>
        <button type="button" data-year="2024">2024</button>
        <button type="button" data-year="2025">2025</button>
        <button type="button" data-year="2026" class="active">2026</button>
      </div>

      <section class="clay-control" aria-label="Music controller">
        <section class="music-list-panel" aria-label="Year music list">
          <div class="panel-title"><i></i><span id="musicListTitle">2026 MUSIC LIST</span><i></i></div>
          <ol id="controlSongList" class="song-list"></ol>
        </section>

        <section class="playback-panel" aria-label="Current music">
          <div class="ecg-line" aria-hidden="true">
            <svg viewBox="0 0 620 70" role="img">
              <defs>
                <filter id="ecgGlow" x="-10%" y="-80%" width="120%" height="260%">
                  <feGaussianBlur stdDeviation="2.2" result="blur" />
                  <feMerge>
                    <feMergeNode in="blur" />
                    <feMergeNode in="SourceGraphic" />
                  </feMerge>
                </filter>
              </defs>
              <path id="ecgShadowPath" class="ecg-shadow" d="M8 37 H58 L66 34 L75 38 H94 L104 22 L116 58 L130 12 L145 45 L165 37 H230 L239 33 L249 40 L263 29 L278 37 H330 L340 36 L352 41 L366 28 L384 37 H444 L457 52 L472 16 L488 42 L503 36 H560 L570 32 L580 38 H612" />
              <path id="ecgMainPath" class="ecg-main" d="M8 37 H58 L66 34 L75 38 H94 L104 22 L116 58 L130 12 L145 45 L165 37 H230 L239 33 L249 40 L263 29 L278 37 H330 L340 36 L352 41 L366 28 L384 37 H444 L457 52 L472 16 L488 42 L503 36 H560 L570 32 L580 38 H612" />
              <circle id="ecgBeatDot" class="ecg-dot" cx="472" cy="16" r="5" />
            </svg>
          </div>
          <h1 id="currentSongTitle">Loading music</h1>

          <div class="transport-row">
            <button id="playModeButton" type="button" class="mode-button" aria-label="Play mode: List loop" title="List loop">
              <svg class="mode-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                <path d="M18.7 9.5a7 7 0 0 0-12.1-2.2"></path>
                <path d="M6.6 7.3H3.9V4.6"></path>
                <path d="M5.3 14.5a7 7 0 0 0 12.1 2.2"></path>
                <path d="M17.4 16.7h2.7v2.7"></path>
              </svg>
            </button>
            <button id="prevButton" type="button" class="round-button" aria-label="Previous song">
              <span aria-hidden="true">&#10073;&#9664;</span>
            </button>
            <button id="playButton" type="button" class="round-button play" aria-label="Play">
              <span aria-hidden="true">&#9654;</span>
            </button>
            <button id="nextButton" type="button" class="round-button" aria-label="Next song">
              <span aria-hidden="true">&#9654;&#10073;</span>
            </button>
            <label class="volume-control">
              <span>VOL</span>
              <input id="volumeSlider" type="range" min="0" max="100" value="50" />
            </label>
          </div>

          <div class="progress-row">
            <span id="currentTime">0:00</span>
            <input id="progressSlider" type="range" min="0" max="1000" value="0" aria-label="Listening progress" />
            <span id="durationTime">0:00</span>
          </div>
        </section>

        <section class="singer-intro-panel" aria-label="Singer intro">
          <div class="singer-panel">
            <img id="singerImage" alt="" referrerpolicy="no-referrer" />
            <img id="singerImageNext" alt="" aria-hidden="true" referrerpolicy="no-referrer" />
            <div id="singerImageNameFallback" class="singer-image-name-fallback" aria-hidden="true">
              <span class="singer-image-name-cn"></span>
              <span class="singer-image-name-en"></span>
            </div>
          </div>
          <div class="singer-copy">
            <div id="singerDisplayName" class="singer-display-name"></div>
            <p id="singerIntro" class="singer-intro" tabindex="0"></p>
          </div>
        </section>
      </section>

      <p id="emptyState" class="empty-state" aria-live="polite"></p>
      <audio id="controlAudio" preload="metadata"></audio>
    </main>

    <script src="assets/audio/manifest.js?v=year-audio-1"></script>
    <script src="assets/audio/title-translations.js?v=title-translations-1"></script>
    <script src="output/artist-image-manifest.js?v=curated-face-crop-1"></script>
    <script src="output/artist-info-manifest.js?v=artist-info-1"></script>
    <script src="control.js?v=artist-name-fallback-1"></script>
  </body>
</html>
